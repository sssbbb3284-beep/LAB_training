<!doctype html>
<html lang="ar" dir="ltr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<title>Lab Training</title>

<style>
:root{
  --bg:#0f172a;
  --panel:#0a1220;
  --text:#e5e7eb;
  --muted:#9ca3af;
  --accent:#22c55e;
  --danger:#ef4444;
  --overlay-bg: rgba(0,0,0,.65);
  --radius: 14px;
  --radius-sm: 10px;
  --maxw: 960px;
  --safe-top: env(safe-area-inset-top);
  --safe-bottom: env(safe-area-inset-bottom);
}

*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  font-family:"Tahoma","Segoe UI",system-ui,sans-serif;
  color:var(--text);
  background:radial-gradient(1400px 900px at 15% -10%, #1f2937 0%, #0f172a 40%, #0b1224 100%) fixed;
}

.app{min-height:100dvh; display:flex; flex-direction:column; gap:12px; padding:14px; padding-top:calc(14px + var(--safe-top)); padding-bottom:calc(14px + var(--safe-bottom));}

header.appbar{
  display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap;
  gap:10px; max-width:var(--maxw); margin:0 auto;
  padding:10px 14px; background:linear-gradient(180deg,#0b1220,#0a1322);
  border:1px solid #1f2937; border-radius:var(--radius);
  box-shadow:0 8px 24px rgba(0,0,0,.25);
  position:sticky; top:8px; z-index:50; backdrop-filter:blur(6px);
}

.pill{
  background:#0b1220; border:1px solid #243041; border-radius:999px;
  padding:6px 10px; font-size:13px; color:var(--muted);
}

.val{font-weight:700; color:#a7f3d0;}
.btn{
  appearance:none; border:none; cursor:pointer;
  font-weight:600; font-size:13px;
  padding:8px 12px; border-radius:10px;
  background:#0e1a30; color:#e5e7eb; border:1px solid #1f2937;
}

.stage{
  background:#0a1220; border:1px solid #1f2937; border-radius:var(--radius);
  overflow:hidden; box-shadow:0 12px 32px rgba(0,0,0,.28);
  max-width:var(--maxw); margin:0 auto; width:100%;
}

.media-wrap{
  position:relative; width:100%;
  background:#0b1220; overflow:hidden;
}
.base-media{width:100%; height:100%; object-fit:contain; display:block;}

.overlay-media{
  position:absolute; inset:0; display:none;
  align-items:center; justify-content:center;
  background:transparent; z-index:6;
}
.overlay-media.active{display:flex;}
.overlay-media img, .overlay-media video{width:100%; height:100%; object-fit:contain;}

.overlay-close{
  position:absolute; top:10px; left:10px;
  background:rgba(0,0,0,.5); border:1px solid #374151; color:white;
  border-radius:10px; padding:6px 10px; cursor:pointer; z-index:7;
}

.hotspot{
  position:absolute; z-index:5; border:none;
  background:transparent; pointer-events:auto;
}

.panel{padding:14px; border-top:1px solid #1f2937; background:#0b1324;}

.question{display:none; background:#0b1220; border:1px solid #1f2937;
          border-radius:12px; padding:14px;}
.question.active{display:block;}

.opt{
  display:flex; align-items:flex-start; gap:10px;
  border:1px solid #223047; background:#091226;
  padding:10px; border-radius:10px; min-width:220px;
}

.options{display:flex; flex-wrap:wrap; gap:10px;}

.modal{position:fixed; inset:0; display:none;
       align-items:center; justify-content:center;
       background:var(--overlay-bg); z-index:80; padding:14px;}
.modal.active{display:flex;}

.toast{position:fixed; right:14px; bottom:14px; background:#0b1324;
       border:1px solid #1f2937; color:white; padding:10px 12px;
       border-radius:10px; display:none;}
.toast.show{display:block;}


.start-screen {
  position: fixed;
  inset: 0;
  z-index: 120; 
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  background: radial-gradient(1400px 900px at 15% -10%, #0f172a 0%, #0b1224 60%, #08101e 100%);
}

.start-screen::before {
  content: '';
  position: absolute;
  inset: 0;
  background: center/contain no-repeat url('logo.png'); 
  opacity: 0.08; 
  pointer-events: none;
}

.start-box {
  position: relative;
  max-width: min(920px, 90vw);
  width: 100%;
  background: rgba(10, 18, 32, 0);
  border: 1px solid #1f2937;
  border-radius: var(--radius);
  box-shadow: 0 18px 50px rgba(0,0,0,.38);
  padding: clamp(16px, 2.6vw, 28px);
  backdrop-filter: blur(8px);
  color: var(--text);
 text-align: center;
}

.start-title {
  margin: 0 0 8px 0;
  font-weight: 800;
  line-height: 1.15;
  letter-spacing: .2px;
  font-size: clamp(28px, 5vw, 44px);
  text-shadow: 0 2px 6px rgba(0,0,0,.55);
}
.start-desc {
  margin: 0 0 16px 0;
  color: #d1d5db;
  font-size: clamp(14px, 2.5vw, 18px);
  line-height: 1.6;
  text-shadow: 0 1px 4px rgba(0,0,0,.5);
}

.start-actions {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 10px 0 14px 0;
justify-content: center;
}
#startBtn {
  appearance: none;
  border: 1px solid #065f46;
  background: linear-gradient(180deg, #047857, #065f46);
  color: #ecfdf5;
  padding: 12px 18px;
  border-radius: 12px;
  font-weight: 800;
  font-size: clamp(14px, 2.6vw, 16px);
  cursor: pointer;
  box-shadow: 0 8px 24px rgba(0,0,0,.25), inset 0 1px 0 rgba(255,255,255,.06);
}
#startBtn:active { transform: translateY(1px); }

.start-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 12px;
  margin-top: 10px;
}
@media (min-width: 720px) {
  .start-grid { grid-template-columns: 1fr 1fr; gap: 14px; }
}
.start-card {
  background: rgba(9, 18, 38, 0.66);
  border: 1px solid #223047;
  border-radius: var(--radius-sm);
  padding: 12px;
  color: #e5e7eb;
  line-height: 1.7;
  font-size: clamp(13px, 2.2vw, 15px);
  text-shadow: 0 1px 4px rgba(0,0,0,.5);
}

.start-card strong, .start-title, .start-desc {
  text-shadow:
    0 2px 6px rgba(0,0,0,.55),
    0 0 1px rgba(0,0,0,.35);
}

.start-screen.hidden { display: none; }

#startBtn:focus-visible {
  outline: 3px solid #22c55e;
  outline-offset: 2px;
}

</style>
</head>

<body>

<div class="app">
  <!-- Start Screen -->
  <div id="startScreen" class="start-screen">
    <div class="start-box">
      <h1 class="start-title">Preanalytical Phase Overview</h1>
      <p class="start-desc">
        A collaborative project designed and developed by Taibah
        University students in cooperation with the OPD and Receiving
        Laboratory Department at Prince Mohammed Bin Abdulaziz
        National Guard Hospital, Medina.
      </p>
      <div class="start-actions">
        <button id="startBtn" type="button">start</button>
      </div>
    </div>
  </div>

  <!-- HEADER -->
  <header class="appbar">
    <div class="score">
      <span class="pill">Points: <span id="scoreVal">100</span></span>
      <span class="pill">Remaining of 100: <span id="remainVal">100</span></span>
      <span class="pill" id="progressText"></span>
    </div>
    <button id="fsBtn" class="btn">Full screen ⛶</button>
  </header>

  <main>
    <section class="stage">
      <div id="mediaWrap" class="media-wrap">
        <div id="overlay" class="overlay-media">
          <button id="overlayCloseBtn">Close ×</button>
        </div>
      </div>

      <div class="panel">
        <div id="questionBox" class="question">
          <h3 id="qTitle"></h3>
          <div id="options" class="options"></div>
          <button id="submitBtn">Answer</button>
          <button id="skipBtn">Continue</button>
        </div>
      </div>
    </section>
  </main>
</div>

<div id="toast" class="toast"></div>

<script>
/* ===========================
   ✅ JavaScript مصحّح بالكامل
   =========================== */

// -------- SCENARIOS --------
function makeScenario(cfg){ return {...cfg, gating:{requireOverlay:true,requiredMessageCount:1}} }

// (السيناريوهات نفسها بدون تغيير)
const SECTIONS = [{

 makeScenario({

        ],
        correctChoiceId:'b',

        messageHotspots:[
          {imgLeft:92, imgTop:1, imgWidth:5, imgHeight:10, title:'Hint', body:'Click on the computer and the patient.'},

        ]
      }),


      makeScenario({
        id:'1-1',
        baseSrc:'case1basic.jpg',
        overlaySrc:'case1S.jpg',
        question:'What is the correct action ?',
        choices:[
          {id:'a', label:'Collect the sample.'},
          {id:'b', label:'Collect the sample with a comment.'},
          {id:'c', label:'Reschedule after 8-12 hours of fasting.'}
        ],
        correctChoiceId:'c',
        penalty:5,
        wrongReason:'Some blood tests require specific requirements the patient should meet before collection such as fasting, medication timing, resting, etc. For example: Triglycerides are significantly affected by food intake.',
        overlayHotspots:[{imgLeft:48, imgTop:6, imgWidth:19, imgHeight:22}],
        messageHotspots:[
          {imgLeft:92, imgTop:1, imgWidth:5, imgHeight:10, title:'Hint', body:'Click on the computer and the patient.'},
          {imgLeft:11, imgTop:20, imgWidth:35, imgHeight:75, title:'info.', body:'The patient ate two hours ago.'}
        ]
      }),

      makeScenario({
        id:'1-2',
        baseSrc:'case2basic.jpg',
        overlaySrc:'case2S.jpg',
        question:'What is the correct action ?',
        choices:[
          {id:'a', label:'Collect the sample.'},
          {id:'b', label:'Collect the sample with a comment.'},
          {id:'c', label:'Reschedule testing and ask the patient to meet the requirement correctly'}
        ],
        correctChoiceId:'c',
        penalty:5,
        wrongReason:'Extended fasting may alter glucose and other analytes. This falls under meeting testing requirements.',
        overlayHotspots:[{imgLeft:48, imgTop:6, imgWidth:19, imgHeight:22}],
        messageHotspots:[
          {imgLeft:90.8, imgTop:1, imgWidth:5, imgHeight:10, title:'Hint', body:'Click on the computer and the patient.'},
          {imgLeft:11, imgTop:20, imgWidth:35, imgHeight:75, title:'info.', body:'The patient ate 18 hours ago.'}
        ]
      }),

      makeScenario({
        id:'1-3',
        baseSrc:'case3basic.jpg',
        overlaySrc:'case3S.jpg',
        question:'What is the correct action ?',
        choices:[
          {id:'a', label:'collect the sample'},
          {id:'b', label:'Release and reapply immediately before puncture'},
          {id:'c', label:'Reschedule testing '}
        ],
        correctChoiceId:'b',
        penalty:5,
        wrongReason:'Prolonged and extra tight tourniquet application causes hemoconcentration, intracellular component leaking, and possible hemolysis.',
        overlayHotspots:[{imgLeft:48, imgTop:6, imgWidth:19, imgHeight:22}],
        messageHotspots:[
          {imgLeft:90.8, imgTop:1, imgWidth:5, imgHeight:10, title:'Hint', body:'Click on the computer and the patient.'},
          {imgLeft:11, imgTop:20, imgWidth:35, imgHeight:75, title:'info.', body:'Tourniquet applied long'}
        ]
      }),
 makeScenario({
        id:'1-4',
        baseSrc:'case4basic.jpg',
        overlaySrc:'case3S.jpg',
        question:'What is the correct action ?',
        choices:[
          {id:'a', label:'collect the sample since we already disinfected the skin'},

        ],
        correctChoiceId:'b',
        penalty:5,
        wrongReason:'Touching cause contamination and  increases false positives.',
        overlayHotspots:[{imgLeft:48, imgTop:6, imgWidth:19, imgHeight:22}],
        messageHotspots:[
          {imgLeft:90.8, imgTop:1, imgWidth:5, imgHeight:10, title:'Hint', body:'Click on the computer and the patient.'},
          {imgLeft:11, imgTop:20, imgWidth:35, imgHeight:75, title:'info.', body:'The patient scratched the area after it had been disinfected.'}
        ]
      }),

      makeScenario({
        id:'1-5',
        baseSrc:'case5basic.jpg',
        overlaySrc:'case5S.jpg',
        question:'What is the correct action ?',
        choices:[
          {id:'a', label:'Correct action, we will complete the process.'},
          {id:'b', label:'Incorrect action: We must fill the anaerobic bottle before filling the aerobic bottle.'},
          {id:'c', label:'Change the needle size to have a good flow.'}
        ],
        correctChoiceId:'a',
        penalty:5,
        wrongReason:'The tubing of a butterfly set contains a small amount of air.If you fill the anaerobic bottle first, that air may enter it and affect the growth of anaerobic organisms.',
        overlayHotspots:[{imgLeft:47, imgTop:6, imgWidth:19, imgHeight:22}],
         messageHotspots:[
          {imgLeft:93, imgTop:1, imgWidth:5, imgHeight:10, title:'Hint', body:'Click on the computer and the blood culture bottles.'},
          {imgLeft:65, imgTop:20, imgWidth:10, imgHeight:15, title:'info.', body:'The aerobic bottle is filled before the anaerobic one by using a butterfly needle.'}
        ]

      }),

      makeScenario({
        id:'1-6',
        baseSrc:'case6basic.jpg',
        overlaySrc:'case6S.jpg',
        question:'What is the correct action ?',
        choices:[
          {id:'a', label:'Reject if affected. Gently invert the tube 3-5 times.'},
          {id:'b', label:'Centrifuge sample immediately to save it.'},
          {id:'c', label:'Accept the sample since it's already collected.'}
        ],
        correctChoiceId:'a',
        penalty:5,
        wrongReason:'Excessive agitation causes hemolysis.',
        overlayHotspots:[{imgLeft:48, imgTop:6, imgWidth:19, imgHeight:22}],
        messageHotspots:[
          {imgLeft:93, imgTop:1, imgWidth:5, imgHeight:10, title:'Hint', body:'Click on the computer and Tubes.'},
          {imgLeft:62, imgTop:20, imgWidth:10, imgHeight:15, title:'info.', body:'The tube was shaken aggressively.'}
        ]

      }),

      makeScenario({
        id:'1-7',
        baseSrc:'case7basic.jpg',
        overlaySrc:'case7S.jpg',
        question:'What is the correct action ?',
        choices:[
          {id:'a', label:'Wrong procedure; need to perform a fresh venipuncture.'},
          {id:'b', label:'Accept the sample and send it to the lab.'},
          {id:'c', label:'Add a comment to the sample label with a pen.'}

        ],
        correctChoiceId:'a',
        penalty:5,
        wrongReason:'Fresh venipuncture ensures uncontaminated, reliable results.',
        overlayHotspots:[{imgLeft:48, imgTop:6, imgWidth:19, imgHeight:22}],
         messageHotspots:[
          {imgLeft:90, imgTop:1, imgWidth:5, imgHeight:10, title:'Hint', body:'Click on the computer and the patient.'},
          {imgLeft:60, imgTop:26, imgWidth:30, imgHeight:65, title:'info.', body:'Blood has been drawn from an existing cannula.'}
        ]

      }),

      makeScenario({
        id:'1-8',
        baseSrc:'case8basic.jpg',
        overlaySrc:'case7S.jpg',
        question:'What is the correct action ?',
        choices:[
           {id:'a', label:'Send it to the lab.'},
          {id:'b', label:'Reject the sample and recollect it after removing the IV bag.'},
          {id:'c', label:'Reject and recollect from a site opposite to the cannula side.'}
        ],
        correctChoiceId:'c',
        penalty:5,
        wrongReason:'Fresh venipuncture ensures uncontaminated, reliable results.',
        overlayHotspots:[{imgLeft:48, imgTop:6, imgWidth:19, imgHeight:22}],
         messageHotspots:[
          {imgLeft:90, imgTop:1, imgWidth:5, imgHeight:10, title:'Hint', body:'Click on the computer and the patient.'},
          {imgLeft:60, imgTop:26, imgWidth:30, imgHeight:65, title:'info.', body:'The sample was collected from the same hand holding the IV bag, holding the active IV bag.'}
        ]

      })

     ]
}];

// -------- STATE --------
const state = {
  points:100,
  sectionIndex:0,
  scenarioIndex:0,
  overlayOpenedCount:0,
  messageOpenedSet:new Set(),
  answered:false,
  started:false
};

// -------- ELEMENTS --------
const startScreen = document.getElementById('startScreen');
const startBtn = document.getElementById('startBtn');
const mediaWrap = document.getElementById('mediaWrap');
const qTitle = document.getElementById('qTitle');
const questionBox = document.getElementById('questionBox');
const optionsEl = document.getElementById('options');
const fsBtn = document.getElementById('fsBtn');

// -------- FUNCTIONS --------
function loadScenario(){
  questionBox.classList.add('active');
  qTitle.textContent = 'Scenario Loaded ✅';
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1500);
}

// -------- START BUTTON ✅ --------
startBtn.addEventListener('click', () => {
  if (state.started) return;
  state.started = true;
  startScreen.classList.add('hidden');
  loadScenario();
});

// -------- FULLSCREEN --------
fsBtn.addEventListener('click', async () => {
  if (!document.fullscreenElement) {
    await document.documentElement.requestFullscreen();
  } else {
    await document.exitFullscreen();
  }
});
</script>

</body>
</html>
